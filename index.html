<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FrenchQuest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5C4D8A">
<title>FrenchQuest - Learn French</title>
<style>
/* ════════════════════════════════════════════
   FrenchQuest - Styles
   ════════════════════════════════════════════ */

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #FAFAFE; min-height: 100vh; }
input, textarea { font-size: 16px; }
input:focus, textarea:focus { border-color: #5C4D8A !important; box-shadow: 0 0 0 3px rgba(92,77,138,0.1); outline: none; }
button { font-family: inherit; }
button:hover:not(:disabled) { filter: brightness(1.05); }
::selection { background: #E8E0F0; }

/* ── Animations ── */
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bobbing { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes splash { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
@keyframes wiggle { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.fade-in { animation: fadeIn 0.3s ease; }

/* ── Nav ── */
.nav { display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 2px solid #E8E0F0; padding: 0 16px; height: 56px; position: sticky; top: 0; z-index: 100; }
.nav-logo { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 17px; color: #3A3A5C; letter-spacing: -0.5px; cursor: pointer; }
.nav-tabs { display: flex; gap: 2px; flex-wrap: wrap; }
.nav-tab { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; background: transparent; color: #8888A0; transition: all 0.2s; white-space: nowrap; }
.nav-tab.active { background: #EDE7F6; color: #5C4D8A; }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-points { display: flex; align-items: center; gap: 4px; background: #FFF8E1; padding: 4px 10px; border-radius: 16px; font-weight: 700; color: #D4A053; font-size: 13px; }
.nav-user { display: flex; align-items: center; gap: 4px; background: #E8E0F0; padding: 4px 10px; border-radius: 16px; font-weight: 600; color: #5C4D8A; font-size: 12px; cursor: pointer; border: none; }
.nav-timer { display: flex; align-items: center; gap: 4px; background: #E8F5E9; padding: 4px 10px; border-radius: 16px; font-weight: 600; color: #2E7D32; font-size: 12px; }
.nav-timer.warning { background: #FFF3E0; color: #E65100; }
.nav-timer.expired { background: #FFEBEE; color: #C62828; }

/* ── Layout ── */
.container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }
.section-title { font-size: 22px; color: #3A3A5C; margin-bottom: 4px; }
.section-desc { color: #888; font-size: 14px; margin-bottom: 20px; }

/* ── Level Selector ── */
.level-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.level-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; border: 2px solid #E0E0E0; background: #fff; cursor: pointer; font-weight: 600; font-size: 13px; color: #3A3A5C; transition: all 0.2s; }
.level-btn.active { border-color: var(--lv-color); background: color-mix(in srgb, var(--lv-color) 8%, white); }
.level-btn.locked { opacity: 0.5; cursor: default; background: #F5F5F5; color: #aaa; }

/* ── Learn Tabs ── */
.learn-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.learn-tab { display: flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; border: none; background: #E8E0F0; color: #5C4D8A; font-weight: 600; cursor: pointer; font-size: 13px; }
.learn-tab.active { background: #5C4D8A; color: #fff; }

/* ── Cards ── */
.card { background: #fff; border: 2px solid #E0E0F0; border-radius: 16px; padding: 28px; margin-bottom: 16px; }
.flashcard { background: #fff; border: 2px solid #E0E0F0; border-radius: 16px; padding: 40px 28px; text-align: center; cursor: pointer; min-height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.3s; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.flashcard.flipped { background: #F0F7FF; }

/* ── Progress bar ── */
.progress-track { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 16px; }
.progress-fill { height: 8px; border-radius: 4px; transition: width 0.4s; }

/* ── Buttons ── */
.btn { padding: 10px 24px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 15px; transition: all 0.2s; }
.btn-primary { background: #5C4D8A; color: #fff; }
.btn-secondary { background: #E8E0F0; color: #5C4D8A; }
.btn-success { background: #6B8E4E; color: #fff; }
.btn-danger { background: #D05050; color: #fff; }
.btn-disabled { background: #eee; color: #ccc; cursor: default; }
.btn-small { padding: 8px 16px; font-size: 13px; border-radius: 8px; }

/* ── Feedback ── */
.feedback { border-radius: 12px; padding: 14px 18px; margin-top: 14px; }
.feedback-correct { background: #E8F5E9; border: 2px solid #6B8E4E; }
.feedback-accepted { background: #FFF8E1; border: 2px solid #D4A053; }
.feedback-close { background: #FFF3E0; border: 2px solid #E68A00; }
.feedback-wrong { background: #FFEBEE; border: 2px solid #E57373; }

/* ── Sentence colors ── */
.word-subject { color: #4A90D9; background: rgba(74,144,217,0.08); }
.word-verb { color: #D05050; background: rgba(208,80,80,0.08); }
.word-complement { color: #6B8E4E; background: rgba(107,142,78,0.08); }

/* ── Grids ── */
.badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.badge-card { background: #fff; border: 2px solid #E0E0E040; border-radius: 14px; padding: 16px 14px; text-align: center; transition: all 0.2s; }
.badge-card.locked { background: #F5F5F5; opacity: 0.45; border-color: #E0E0E0; }
.shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.shop-item { background: #fff; border: 2px solid #E8E0F0; border-radius: 14px; padding: 18px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.2s; }
.fish-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }

/* ── Toast ── */
.toast { position: fixed; top: 70px; right: 20px; z-index: 1000; background: #5C4D8A; color: #fff; padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 14px; box-shadow: 0 4px 20px rgba(92,77,138,0.3); animation: slideIn 0.3s ease; }

/* ── Test result row ── */
.test-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; margin-bottom: 4px; }

/* ── Fishing scene ── */
.fishing-scene { background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 55%, #2E86AB 55%, #1B4965 100%); border-radius: 16px; height: 320px; position: relative; overflow: hidden; margin-bottom: 16px; }
.fish-sprite { position: absolute; transition: all 0.5s ease; }
.fish-sprite.caught { animation: bobbing 0.3s ease 3; }

/* ── Dictionary ── */
.dict-entry { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
.dict-entry:last-child { border-bottom: none; }
.dict-cat { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

/* ── Notes ── */
.note-card { background: #FFFDE7; border: 1px solid #FFF9C4; border-radius: 10px; padding: 14px; margin-bottom: 10px; }

/* ── Login ── */
.login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #E8E0F0 0%, #E3F2FD 100%); }
.login-box { background: #fff; border-radius: 20px; padding: 40px 36px; max-width: 400px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }

/* ── Limit overlay ── */
.limit-overlay { background: #fff; border: 2px solid #E8E0F0; border-radius: 16px; padding: 40px; text-align: center; }

/* ── Level info bar ── */
.level-info { border-radius: 12px; padding: 12px 18px; margin-bottom: 16px; }
.footer { text-align: center; padding: 32px 0 16px; color: #ccc; font-size: 12px; }

/* ════════════════════════════════════════════
   RESPONSIVE - Tablets
   ════════════════════════════════════════════ */
@media (max-width: 700px) {
  .nav { flex-wrap: wrap; height: auto; padding: 8px 10px; gap: 4px; }
  .nav-tabs { order: 3; width: 100%; justify-content: center; padding-top: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .nav-tab { padding: 8px 10px; font-size: 12px; min-height: 36px; }
  .nav-right { gap: 4px; flex-wrap: wrap; justify-content: center; }
  .nav-points, .nav-timer, .nav-user { font-size: 11px; padding: 3px 8px; }
  .container { padding: 14px 8px; }
  .card { padding: 18px 14px; }
  .flashcard { padding: 28px 16px; min-height: 130px; }
  .shop-grid, .badge-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .shop-item { padding: 14px 10px; }
  .fish-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  .fishing-scene { height: 240px; }
  .login-box { padding: 28px 20px; margin: 0 12px; }
  .btn { padding: 12px 20px; font-size: 15px; min-height: 44px; }
  .btn-small { padding: 10px 14px; font-size: 13px; min-height: 40px; }
  input, textarea { font-size: 16px !important; }
  .level-bar { gap: 6px; }
  .level-btn { padding: 8px 10px; font-size: 12px; }
  .learn-tabs { gap: 4px; }
  .learn-tab { padding: 8px 10px; font-size: 12px; }
  .dict-entry { padding: 10px 12px; }
  .section-title { font-size: 19px; }
}

/* ════════════════════════════════════════════
   RESPONSIVE - Small phones
   ════════════════════════════════════════════ */
@media (max-width: 400px) {
  .nav-logo { font-size: 14px; }
  .nav-tab { padding: 6px 7px; font-size: 11px; }
  .shop-grid, .badge-grid { grid-template-columns: 1fr 1fr; }
  .fish-grid { grid-template-columns: 1fr 1fr; }
  .fishing-scene { height: 200px; }
}

/* ── Safe area for notched phones ── */
@supports (padding: env(safe-area-inset-top)) {
  .nav { padding-top: calc(8px + env(safe-area-inset-top)); }
  body { padding-bottom: env(safe-area-inset-bottom); }
}

/* ── Touch improvements ── */
@media (hover: none) and (pointer: coarse) {
  button, .nav-tab, .level-btn, .learn-tab, .nav-user { -webkit-tap-highlight-color: transparent; }
}

</style>
</head>

// ── Helpers ──
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function getTodayKey() { return new Date().toISOString().slice(0, 10); }

// ── Answer Checking ──
function norm(s) {
  return s.toLowerCase().trim()
    .replace(/['\u2019]/g, "'").replace(/[?!.,;:]/g, "").replace(/\s+/g, " ")
    .replace(/[\u00e0\u00e2\u00e4]/g, "a").replace(/[\u00e9\u00e8\u00ea\u00eb]/g, "e")
    .replace(/[\u00ee\u00ef]/g, "i").replace(/[\u00f4\u00f6]/g, "o")
    .replace(/[\u00f9\u00fb\u00fc]/g, "u").replace(/\u00e7/g, "c").replace(/\u0153/g, "oe");
}

function lev(a, b) {
  const m = a.length, n = b.length;
  const d = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) d[i][0] = i;
  for (let j = 0; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      d[i][j] = a[i - 1] === b[j - 1] ? d[i - 1][j - 1] : 1 + Math.min(d[i - 1][j], d[i][j - 1], d[i - 1][j - 1]);
  return d[m][n];
}

function checkAns(ua, correct, acc) {
  const n1 = norm(ua), nc = norm(correct);
  if (n1 === nc) return { status: "correct", corrected: null };
  for (const alt of (acc || []))
    if (n1 === norm(alt)) return ua.toLowerCase().trim() !== alt.toLowerCase().trim() ? { status: "accepted", corrected: correct } : { status: "correct", corrected: null };
  if (n1.length > 2 && nc.length > 2 && lev(n1, nc) <= 2) return { status: "close", corrected: correct };
  return { status: "wrong", corrected: correct };
}

// ── Fishing Word Pool ──
function getFishingWords(userLevel) {
  const pool = [];
  LEVELS.forEach(lv => {
    if (lv.id <= userLevel) {
      lv.flashcards.forEach(f => pool.push({ en: f.en.split("/")[0].trim(), fr: f.fr, level: lv.id }));
    }
  });
  DICT_ENTRIES.forEach(d => {
    if (d.cat === "Animals" || d.cat === "Gaming") pool.push({ en: d.en, fr: d.fr, level: 2 });
  });
  return pool;
}

function pickFish(rodLevel, userLevel) {
  const tier = Math.min(3, Math.max(1, rodLevel));
  const w = { ...RARITY_WEIGHTS[tier] };
  const eligible = FISH_SPECIES.filter(f => f.minLevel <= userLevel);
  const total = Object.values(w).reduce((a, b) => a + b, 0);
  let r = Math.random() * total, cum = 0;
  let rarity = "common";
  for (const [k, v] of Object.entries(w)) { cum += v; if (r <= cum) { rarity = k; break; } }
  const pool = eligible.filter(f => f.rarity === rarity);
  if (pool.length === 0) return eligible.filter(f => f.rarity === "common")[0] || eligible[0];
  return pick(pool);
}

// ── Storage Helpers (multi-user) ──
function ensureDefaultAccounts() {
  try {
    let accs = JSON.parse(localStorage.getItem("fq_accounts") || "[]");
    if (!accs.find(a => a.username === "Batiste")) {
      accs.push({ username: "Batiste", code: "1234" });
      localStorage.setItem("fq_accounts", JSON.stringify(accs));
      if (!localStorage.getItem("fq_Batiste")) localStorage.setItem("fq_Batiste", JSON.stringify({ ...DEFAULT_PROFILE }));
    }
  } catch (e) {}
}

function getAccounts() { try { ensureDefaultAccounts(); return JSON.parse(localStorage.getItem("fq_accounts") || "[]"); } catch (e) { return []; } }
function saveAccounts(a) { try { localStorage.setItem("fq_accounts", JSON.stringify(a)); } catch (e) {} }
function loadProfile(username) { try { return JSON.parse(localStorage.getItem("fq_" + username) || "null"); } catch (e) { return null; } }
function saveProfile(username, data) { try { localStorage.setItem("fq_" + username, JSON.stringify(data)); } catch (e) {} }

function Toast({message,onDone}){useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);return<div className="toast">{message}</div>;}

function LimitOverlay(){
  return(
    <div className="limit-overlay fade-in">

      <h3 style={{fontSize:22,color:"#3A3A5C",margin:"16px 0 8px"}}>Time to Take a Break!</h3>
      <p style={{color:"#888",fontSize:15,maxWidth:400,margin:"0 auto 16px"}}>

}

function LevelSelector({levels,unlockedLevels,currentLevel,setCurrentLevel,completedTests}){
  return(<div className="level-bar">{levels.map(lv=>{
    const unlocked=unlockedLevels.includes(lv.id),completed=completedTests.includes(lv.id),active=currentLevel===lv.id;
    return(<button key={lv.id} onClick={()=>unlocked&&setCurrentLevel(lv.id)} className={`level-btn ${active?'active':''} ${!unlocked?'locked':''}`} style={active?{'--lv-color':lv.color,borderColor:lv.color}:{}}>
      {unlocked?(completed?I.check(14,lv.color):I.unlock(14,lv.color)):I.lock(14,"#aaa")}

    </button>);
  })}</div>);
}

function Flashcards({cards,onComplete}){
  const[index,setIndex]=useState(0);const[flipped,setFlipped]=useState(false);const[seen,setSeen]=useState(new Set());
  const card=cards[index],progress=seen.size;
  function next(){const ns=new Set(seen);ns.add(index);setSeen(ns);setFlipped(false);if(index<cards.length-1)setIndex(index+1);else{if(ns.size===cards.length&&onComplete)onComplete();setIndex(0);}}
  return(<div className="fade-in">
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{color:'#888',fontSize:13}}>Card {index+1}/{cards.length}</span><span style={{color:'#6B8E4E',fontSize:13,fontWeight:600}}>{progress}/{cards.length} reviewed</span></div>
    <div className="progress-track"><div className="progress-fill" style={{width:`${(progress/cards.length)*100}%`,background:'#6B8E4E'}}/></div>
    <div className={`flashcard ${flipped?'flipped':''}`} onClick={()=>setFlipped(!flipped)}>
      <div style={{fontSize:12,color:'#aaa',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>{flipped?"English":"French"}</div>
      <div style={{fontSize:26,fontWeight:700,color:'#3A3A5C',marginBottom:10}}>{flipped?card.en:card.fr}</div>
      {!flipped&&<div style={{fontSize:13,color:'#B0A0C0',fontStyle:'italic'}}>Sounds like: {card.audio}</div>}
      <div style={{fontSize:11,color:'#bbb',marginTop:12}}>{flipped?"Click to see French":"Click to reveal English"}</div>
    </div>
    <div style={{display:'flex',justifyContent:'center',gap:10,marginTop:16}}>
      <button onClick={()=>{setFlipped(false);setIndex(Math.max(0,index-1));}} disabled={index===0} className={`btn btn-small ${index===0?'btn-disabled':'btn-secondary'}`}>{I.left(14)} Prev</button>
      <button onClick={next} className="btn btn-small btn-primary">Next {I.right(14)}</button>
    </div>
  </div>);
}

function SentenceViewer({sentences}){
  const[index,setIndex]=useState(0);const s=sentences[index];
  const cm={subject:"#4A90D9",verb:"#D05050",complement:"#6B8E4E"};const lm={subject:"Subject",verb:"Verb",complement:"Complement"};
  return(<div className="fade-in">
    <div style={{color:'#888',fontSize:13,marginBottom:12}}>Sentence {index+1}/{sentences.length}</div>
    <div style={{background:'#FAFAFE',border:'2px solid #E8E0F0',borderRadius:16,padding:'32px 24px',textAlign:'center'}}>
      <div style={{display:'flex',justifyContent:'center',gap:10,flexWrap:'wrap',marginBottom:20}}>
        {s.parts.map((p,i)=>(<div key={i} style={{textAlign:'center'}}><div className={`word-${p.type}`} style={{fontSize:24,fontWeight:700,padding:'3px 10px',borderRadius:8}}>{p.text}</div><div style={{fontSize:10,color:cm[p.type],fontWeight:600,marginTop:3,textTransform:'uppercase'}}>{lm[p.type]}</div></div>))}
      </div>
      <div style={{fontSize:15,color:'#888'}}>{s.parts.map(p=>p.en).join(" ")}</div>
      <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:8}}>
        {["subject","verb","complement"].map(t=>(<span key={t} style={{display:'flex',alignItems:'center',gap:3,fontSize:11,color:cm[t]}}><span style={{width:8,height:8,borderRadius:2,background:cm[t],display:'inline-block'}}/>{lm[t]}</span>))}
      </div>
    </div>
    <div style={{display:'flex',justifyContent:'center',gap:10,marginTop:16}}>
      <button onClick={()=>setIndex(Math.max(0,index-1))} disabled={index===0} className={`btn btn-small ${index===0?'btn-disabled':'btn-secondary'}`}>{I.left(14)} Prev</button>
      <button onClick={()=>setIndex(Math.min(sentences.length-1,index+1))} disabled={index===sentences.length-1} className={`btn btn-small ${index===sentences.length-1?'btn-disabled':'btn-primary'}`}>Next {I.right(14)}</button>
    </div>
  </div>);
}

function ExercisePanel({exercises,onPointsEarned,onAction,limited}){
  const[index,setIndex]=useState(0);const[input,setInput]=useState("");const[fb,setFb]=useState(null);const[done,setDone]=useState(0);
  if(limited)return<LimitOverlay/>;
  const ex=exercises[index];
  function submit(){if(!input.trim())return;const r=checkAns(input,ex.answer,ex.accept);setFb(r);onAction();if(r.status==="correct"||r.status==="accepted"){onPointsEarned(3);setDone(d=>d+1);}else if(r.status==="close"){onPointsEarned(1);setDone(d=>d+1);}}
  function next(){setFb(null);setInput("");setIndex((index+1)%exercises.length);}
  const fc={correct:"#2E7D32",accepted:"#F57F17",close:"#E65100",wrong:"#C62828"};
  return(<div className="fade-in">
    <div style={{color:'#888',fontSize:13,marginBottom:12}}>Exercise {index+1}/{exercises.length} -- {done} done</div>
    <div className="card">
      <div style={{fontSize:12,color:'#aaa',fontWeight:600,textTransform:'uppercase',marginBottom:6}}>{ex.type==="fill"?"Fill in the blank":"Translate"}</div>
      <div style={{fontSize:18,fontWeight:700,color:'#3A3A5C',marginBottom:20}}>{ex.prompt}</div>
      <div style={{display:'flex',gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!fb&&submit()} placeholder="Type your answer..." disabled={!!fb} style={{flex:1,padding:'10px 14px',borderRadius:10,border:'2px solid #E0E0F0',fontSize:15,fontFamily:'inherit'}}/>
        {!fb?<button onClick={submit} className="btn btn-small btn-primary">Check</button>:<button onClick={next} className="btn btn-small btn-primary">Next</button>}
      </div>
    </div>
    {fb&&(<div className={`feedback feedback-${fb.status}`}>
      <div style={{fontWeight:700,color:fc[fb.status],fontSize:15}}>{fb.status==="correct"?pick(MSG_OK):(fb.status==="wrong"?pick(MSG_FAIL):pick(MSG_CLOSE))}</div>
      {fb.corrected&&<div style={{color:'#555',fontSize:13,marginTop:3}}>Correct form: <strong>{fb.corrected}</strong></div>}
      {(fb.status!=="wrong")&&<div style={{color:'#6B8E4E',fontSize:12,marginTop:4,fontWeight:600}}>+{fb.status==="close"?1:3} pts</div>}
    </div>)}
  </div>);
}

function TestPanel({testData,levelId,onPass,onPointsEarned,alreadyPassed,onAction,limited}){
  const[started,setStarted]=useState(false);const[qi,setQi]=useState(0);const[input,setInput]=useState("");
  const[answers,setAnswers]=useState([]);const[fb,setFb]=useState(null);const[finished,setFinished]=useState(false);
  const thr=Math.ceil(testData.length*0.6);
  if(limited&&!started)return<LimitOverlay/>;
  function submitA(){if(!input.trim())return;const r=checkAns(input,testData[qi].a,testData[qi].accept);const ok=r.status==="correct"||r.status==="accepted"||r.status==="close";setAnswers(p=>[...p,{...r,passed:ok,question:testData[qi].q}]);setFb(r);onAction();}
  function nextQ(){setFb(null);setInput("");if(qi<testData.length-1)setQi(qi+1);else{const c=answers.filter(a=>a.passed).length;setFinished(true);onPointsEarned(c*5);if(c>=thr)onPass(levelId);}}
  function restart(){setStarted(false);setQi(0);setAnswers([]);setFb(null);setFinished(false);}
  if(alreadyPassed&&!started)return(<div style={{textAlign:'center',padding:'32px 16px'}} className="fade-in">{I.check(44,"#6B8E4E")}<div style={{fontSize:20,fontWeight:700,color:'#6B8E4E',margin:'12px 0'}}>Level Complete!</div><p style={{color:'#888',marginBottom:16}}>Want to try again?</p><button onClick={()=>{restart();setStarted(true);}} className="btn btn-primary">Retake</button></div>);
  if(!started)return(<div style={{textAlign:'center',padding:'32px 16px'}} className="fade-in">{I.trophy(44,"#D4A053")}<h3 style={{fontSize:20,color:'#3A3A5C',margin:'12px 0'}}>Level {levelId} Test</h3><p style={{color:'#888',marginBottom:6}}>{testData.length} questions. Need {thr} correct.</p><p style={{color:'#6B8E4E',fontSize:13,marginBottom:20}}>Small spelling differences are okay!</p><button onClick={()=>setStarted(true)} className="btn btn-primary" style={{fontSize:16}}>Start Test</button></div>);
  if(finished){const c=answers.filter(a=>a.passed).length;const ok=c>=thr;return(<div style={{textAlign:'center',padding:'28px 16px'}} className="fade-in"><div style={{marginBottom:10}}>{ok?I.award(48,"#D4A053"):I.heart(48,"#D05050")}</div><h3 style={{fontSize:22,color:ok?'#6B8E4E':'#D05050',marginBottom:6}}>{ok?"Congratulations!":"Good effort!"}</h3><p style={{color:'#888',marginBottom:6}}>{c}/{testData.length} correct</p><p style={{color:'#D4A053',fontWeight:700,marginBottom:16}}>+{c*5} pts</p>{!ok&&<p style={{color:'#888',fontSize:13,marginBottom:16}}>Need {thr} to pass. Review and try again!</p>}<div style={{textAlign:'left',maxWidth:440,margin:'0 auto'}}>{answers.map((a,i)=>(<div key={i} className="test-row"><span style={{color:a.passed?'#6B8E4E':'#D05050'}}>{a.passed?I.check(14,"#6B8E4E"):I.x(14,"#D05050")}</span><span style={{color:'#555',fontSize:13,flex:1}}>{a.question}</span>{!a.passed&&<span style={{color:'#888',fontSize:12}}>Ans: {testData[i].a}</span>}</div>))}</div><button onClick={restart} className="btn btn-primary" style={{marginTop:16}}>{ok?"Done":"Try Again"}</button></div>);}
  const fc={correct:"#2E7D32",accepted:"#F57F17",close:"#E65100",wrong:"#C62828"};
  return(<div className="fade-in"><div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{color:'#888',fontSize:13}}>Q{qi+1}/{testData.length}</span><span style={{color:'#6B8E4E',fontSize:13,fontWeight:600}}>{answers.filter(a=>a.passed).length} correct</span></div><div className="progress-track"><div className="progress-fill" style={{width:`${(qi/testData.length)*100}%`,background:'#5C4D8A'}}/></div><div className="card"><div style={{fontSize:18,fontWeight:700,color:'#3A3A5C',marginBottom:20}}>{testData[qi].q}</div><div style={{display:'flex',gap:8}}><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!fb&&submitA()} placeholder="Answer..." disabled={!!fb} style={{flex:1,padding:'10px 14px',borderRadius:10,border:'2px solid #E0E0F0',fontSize:15,fontFamily:'inherit'}}/>{!fb?<button onClick={submitA} className="btn btn-small btn-primary">Check</button>:<button onClick={nextQ} className="btn btn-small btn-primary">{qi<testData.length-1?"Next":"Results"}</button>}</div></div>{fb&&(<div className={`feedback feedback-${fb.status}`}><div style={{fontWeight:700,color:fc[fb.status],fontSize:14}}>{fb.status==="correct"?pick(MSG_OK):(fb.status==="wrong"?pick(MSG_FAIL):pick(MSG_CLOSE))}</div>{fb.corrected&&<div style={{color:'#555',fontSize:13,marginTop:3}}>Correct: <strong>{fb.corrected}</strong></div>}</div>)}</div>);
}

function FishingGame({userLevel,rodLevel,onCatch,onAction,limited,points:userPoints,onSpendPoints,onUpgradeRod,fishInventory}){
  const[phase,setPhase]=useState("idle");
  const[word,setWord]=useState(null);const[input,setInput]=useState("");const[timer,setTimer]=useState(0);
  const[currentFish,setCurrentFish]=useState(null);const[result,setResult]=useState(null);
  const[showInventory,setShowInventory]=useState(false);const[showUpgrades,setShowUpgrades]=useState(false);
  const timerRef=useRef(null);const intervalRef=useRef(null);

  if(limited&&phase==="idle")return<LimitOverlay/>;

  const baseTime = 10 + (ROD_UPGRADES[rodLevel-1]?.timeBonus||0);

  function startFishing(){
    setPhase("casting");setResult(null);
    setTimeout(()=>{setPhase("waiting");
      const waitTime = 1500+Math.random()*2500;
      setTimeout(()=>{
        const pool=getFishingWords(userLevel);const w=pick(pool);setWord(w);
        const fish=pickFish(rodLevel,userLevel);setCurrentFish(fish);
        setTimer(baseTime);setInput("");setPhase("bite");onAction();
      },waitTime);
    },800);
  }

  useEffect(()=>{
    if(phase==="bite"&&timer>0){intervalRef.current=setInterval(()=>{setTimer(t=>{if(t<=1){clearInterval(intervalRef.current);setPhase("result");setResult({caught:false,msg:"The fish got away! Too slow this time."});return 0;}return t-1;});},1000);return()=>clearInterval(intervalRef.current);}
  },[phase]);

  function submitAnswer(){
    if(!input.trim())return;clearInterval(intervalRef.current);
    const r=checkAns(input,word.fr,[word.fr]);
    if(r.status==="correct"||r.status==="accepted"||r.status==="close"){
      onCatch(currentFish);setResult({caught:true,fish:currentFish,msg:r.status==="correct"?pick(MSG_OK):pick(MSG_CLOSE),corrected:r.corrected});
    }else{
      setResult({caught:false,msg:pick(MSG_FAIL)+" The answer was: "+word.fr});
    }
    setPhase("result");
  }

  function sellFish(idx){
    const fish=fishInventory[idx];
    onSpendPoints(-fish.value);
    const newInv=[...fishInventory];newInv.splice(idx,1);
    onCatch(null,newInv);
  }

  function renderScene(){
    return(<div className="fishing-scene">
      <svg width="100%" height="100%" viewBox="0 0 400 320" preserveAspectRatio="xMidYMid slice">
        <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#87CEEB"/><stop offset="55%" stopColor="#B0E0F0"/></linearGradient><linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#2E86AB"/><stop offset="100%" stopColor="#1B4965"/></linearGradient></defs>
        <rect width="400" height="176" fill="url(#sky)"/>
        <rect y="176" width="400" height="144" fill="url(#water)"/>
        <ellipse cx="80" cy="40" rx="40" ry="15" fill="white" opacity="0.7"/><ellipse cx="100" cy="35" rx="30" ry="12" fill="white" opacity="0.7"/>
        <ellipse cx="300" cy="55" rx="35" ry="12" fill="white" opacity="0.6"/>
        <rect x="0" y="165" width="120" height="20" rx="10" fill="#8B7355"/>
        <rect x="10" y="155" width="30" height="15" rx="5" fill="#6B8E4E"/>
        <rect x="50" y="158" width="25" height="12" rx="5" fill="#7CAA5E"/>
        <circle cx="70" cy="130" r="10" fill="#FFD5B0"/>
        <rect x="63" y="140" width="14" height="20" rx="3" fill="#5C4D8A"/>
        <rect x="60" y="160" width="8" height="8" rx="2" fill="#3A3A5C"/>
        <rect x="72" y="160" width="8" height="8" rx="2" fill="#3A3A5C"/>
        <rect x="60" y="122" width="12" height="10" rx="3" fill="#D4A053"/>
        <line x1="80" y1="135" x2="200" y2="100" stroke="#8B6914" strokeWidth="2"/>
        <line x1="200" y1="100" x2="200" y2={phase==="waiting"||phase==="bite"?"200":"170"} stroke="#aaa" strokeWidth="1" strokeDasharray={phase==="waiting"?"":"3,3"}/>
        {(phase==="waiting"||phase==="bite")&&<>
          <circle cx="200" cy="200" r="5" fill={phase==="bite"?"#FF5722":"#F44336"}><animate attributeName="cy" values={phase==="bite"?"195;205;195":"198;202;198"} dur={phase==="bite"?"0.3s":"1.5s"} repeatCount="indefinite"/></circle>
        </>}
        {phase==="bite"&&currentFish&&<g>
          <ellipse cx="220" cy="230" rx="18" ry="10" fill={currentFish.color} opacity="0.8"><animate attributeName="cx" values="215;225;215" dur="0.8s" repeatCount="indefinite"/></ellipse>
          <polygon points="238,230 248,222 248,238" fill={currentFish.color} opacity="0.8"><animate attributeName="points" values="238,230 248,222 248,238;240,230 250,222 250,238;238,230 248,222 248,238" dur="0.8s" repeatCount="indefinite"/></polygon>
        </g>}
        <ellipse cx="150" cy="190" rx="30" ry="3" fill="rgba(255,255,255,0.15)"><animate attributeName="rx" values="30;40;30" dur="3s" repeatCount="indefinite"/></ellipse>
        <ellipse cx="300" cy="210" rx="25" ry="2" fill="rgba(255,255,255,0.1)"><animate attributeName="rx" values="25;35;25" dur="4s" repeatCount="indefinite"/></ellipse>
      </svg>
      {phase==="idle"&&<div style={{position:'absolute',bottom:20,left:0,right:0,textAlign:'center'}}><button onClick={startFishing} className="btn btn-primary" style={{fontSize:16,padding:'12px 32px',boxShadow:'0 4px 15px rgba(92,77,138,0.3)'}}>Cast Line {I.fish(18)}</button></div>}
      {phase==="casting"&&<div style={{position:'absolute',top:'40%',left:0,right:0,textAlign:'center',color:'#fff',fontWeight:700,fontSize:18,textShadow:'0 2px 4px rgba(0,0,0,0.3)'}}>Casting...</div>}
      {phase==="waiting"&&<div style={{position:'absolute',top:'40%',left:0,right:0,textAlign:'center',color:'#fff',fontWeight:600,fontSize:15,textShadow:'0 2px 4px rgba(0,0,0,0.3)',animation:'pulse 1.5s infinite'}}>Waiting for a bite...</div>}
    </div>);
  }

  if(showInventory){
    const grouped={};fishInventory.forEach(f=>{grouped[f.name]=(grouped[f.name]||[]);grouped[f.name].push(f);});
    return(<div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h3 style={{fontSize:18,color:'#3A3A5C'}}>Fish Inventory ({fishInventory.length})</h3>
        <button onClick={()=>setShowInventory(false)} className="btn btn-small btn-secondary">Back to Fishing</button>
      </div>
      {fishInventory.length===0?<p style={{color:'#888',textAlign:'center',padding:32}}>No fish yet! Cast your line to catch some.</p>:
      <div className="fish-grid">{Object.entries(grouped).map(([name,fishes])=>{const f=fishes[0];return(
        <div key={name} style={{background:'#fff',border:`2px solid ${RARITY_COLORS[f.rarity]}30`,borderRadius:12,padding:14,textAlign:'center'}}>
          <div style={{fontSize:28,marginBottom:4}}>{f.emoji}</div>
          <div style={{fontWeight:700,fontSize:13,color:'#3A3A5C'}}>{name}</div>
          <div style={{fontSize:11,color:RARITY_COLORS[f.rarity],fontWeight:600,textTransform:'uppercase'}}>{f.rarity}</div>
          <div style={{fontSize:12,color:'#888',margin:'4px 0'}}>x{fishes.length} | {f.value} pts each</div>
          <button onClick={()=>sellFish(fishInventory.indexOf(fishes[0]))} className="btn btn-small btn-success" style={{fontSize:11,padding:'4px 10px'}}>Sell 1 ({f.value} pts)</button>
        </div>
      );})}</div>}
    </div>);
  }

  if(showUpgrades){
    return(<div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h3 style={{fontSize:18,color:'#3A3A5C'}}>Rod Upgrades</h3>
        <button onClick={()=>setShowUpgrades(false)} className="btn btn-small btn-secondary">Back</button>
      </div>
      <div style={{display:'grid',gap:12}}>{ROD_UPGRADES.map(rod=>{

// DICTIONARY
// ════════════════════════════════════════════
function Dictionary({entries}){
  const[search,setSearch]=useState("");const[cat,setCat]=useState("All");
  const filtered=entries.filter(d=>{
    const matchCat=cat==="All"||d.cat===cat;
    const matchSearch=!search||d.fr.toLowerCase().includes(search.toLowerCase())||d.en.toLowerCase().includes(search.toLowerCase());
    return matchCat&&matchSearch;
  });
  const[transInput,setTransInput]=useState("");const[transResult,setTransResult]=useState(null);
  function translate(){
    if(!transInput.trim()){setTransResult(null);return;}
    const q=transInput.toLowerCase().trim();
    const exact=entries.find(d=>d.en.toLowerCase()===q);
    if(exact){setTransResult({fr:exact.fr,confidence:"exact"});return;}
    const partial=entries.filter(d=>d.en.toLowerCase().includes(q)||q.includes(d.en.toLowerCase()));
    if(partial.length>0){setTransResult({fr:partial.map(p=>p.fr).join(", "),confidence:"partial",matches:partial});return;}
    setTransResult({fr:null,confidence:"none"});
  }

  return(<div className="fade-in">
    <div style={{background:'linear-gradient(135deg,#E3F2FD,#E8E0F0)',borderRadius:14,padding:'18px 20px',marginBottom:20}}>
      <div style={{fontWeight:700,fontSize:14,color:'#3A3A5C',marginBottom:8}}>{I.search(16,"#5C4D8A")} Quick Translate (English to French)</div>
      <div style={{display:'flex',gap:8}}>
        <input value={transInput} onChange={e=>{setTransInput(e.target.value);setTransResult(null);}} onKeyDown={e=>e.key==="Enter"&&translate()} placeholder="Type in English..." style={{flex:1,padding:'10px 14px',borderRadius:10,border:'2px solid #E0E0F0',fontSize:15,fontFamily:'inherit'}}/>
        <button onClick={translate} className="btn btn-small btn-primary">Translate</button>
      </div>
      {transResult&&(<div style={{marginTop:10,padding:'10px 14px',background:'#fff',borderRadius:10}}>
        {transResult.fr?(<><span style={{fontWeight:700,color:'#5C4D8A',fontSize:16}}>{transResult.fr}</span>{transResult.confidence==="partial"&&<span style={{color:'#888',fontSize:12,marginLeft:8}}>(closest matches)</span>}</>)
        :(<span style={{color:'#888',fontSize:14}}>No exact match found. Try a simpler word or check below!</span>)}
      </div>)}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search dictionary..." style={{flex:1,minWidth:200,padding:'8px 14px',borderRadius:8,border:'2px solid #E0E0F0',fontSize:14,fontFamily:'inherit'}}/>
      <select value={cat} onChange={e=>setCat(e.target.value)} style={{padding:'8px 12px',borderRadius:8,border:'2px solid #E0E0F0',fontSize:14,fontFamily:'inherit',background:'#fff'}}>
        <option value="All">All categories</option>
        {DICT_CATS.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
    </div>
    <div style={{background:'#fff',borderRadius:14,border:'2px solid #E0E0F0',overflow:'hidden'}}>
      {filtered.length===0?<div style={{padding:24,textAlign:'center',color:'#888'}}>No results found</div>:
      filtered.slice(0,50).map((d,i)=>(<div key={i} className="dict-entry">
        <div><div style={{fontWeight:700,color:'#3A3A5C',fontSize:15}}>{d.fr}</div><div style={{color:'#888',fontSize:13}}>{d.en}</div></div>
        <span className="dict-cat" style={{background:(CAT_COLORS[d.cat]||"#888")+"18",color:CAT_COLORS[d.cat]||"#888"}}>{d.cat}</span>
      </div>))}
    </div>
  </div>);
}

function LoginScreen({onLogin}){
  const[mode,setMode]=useState("select");
  const[username,setUsername]=useState("");const[code,setCode]=useState("");const[error,setError]=useState("");

  function createAccount(){
    if(username.trim().length<2){setError("Name must be at least 2 characters");return;}
    if(code.length<3){setError("Code must be at least 3 characters");return;}
    if(accounts.find(a=>a.username===username.trim())){setError("This name is already taken");return;}
    const acc={username:username.trim(),code};
    saveAccounts([...accounts,acc]);
    saveProfile(acc.username,{...DEFAULT_PROFILE});
    onLogin(acc.username);
  }
  function login(){
    const acc=accounts.find(a=>a.username===username.trim());

            {I.user(20,"#5C4D8A")} {a.username}
          </button>))}
          <div style={{borderTop:'1px solid #eee',margin:'16px 0'}}/>
        </>)}
        <button onClick={()=>{setMode("create");setError("");setUsername("");setCode("");}} className="btn btn-primary" style={{width:'100%',fontSize:16}}>{I.plus(18)} Create New Profile</button>
      </div>)}

      {mode==="create"&&(<div>
        <div style={{fontWeight:600,color:'#3A3A5C',marginBottom:12}}>Create your profile</div>

        <input value={code} onChange={e=>setCode(e.target.value)} placeholder="Choose a secret code" type="password" style={{width:'100%',padding:'12px 14px',borderRadius:10,border:'2px solid #E0E0F0',fontSize:15,fontFamily:'inherit',marginBottom:10}}/>
        {error&&<div style={{color:'#D05050',fontSize:13,marginBottom:8}}>{error}</div>}
        <button onClick={createAccount} className="btn btn-primary" style={{width:'100%',marginBottom:8}}>Create Profile</button>
        <button onClick={()=>{setMode("select");setError("");}} className="btn btn-secondary" style={{width:'100%'}}>Back</button>
      </div>)}

      {mode==="login"&&(<div>
        <div style={{fontWeight:600,color:'#3A3A5C',marginBottom:12}}>Welcome, {username}!</div>

// MAIN APP
// ════════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);
  const[section,setSection]=useState("learn");const[currentLevel,setCurrentLevel]=useState(1);
  const[learnTab,setLearnTab]=useState("flashcards");const[toast,setToast]=useState(null);
  const[dailyActions,setDailyActions]=useState(0);const[sessionStart]=useState(Date.now());
  const[minutesUsed,setMinutesUsed]=useState(0);

  const profileRef = useRef(profile);
  const userRef = useRef(user);
  useEffect(()=>{profileRef.current=profile;},[profile]);
  useEffect(()=>{userRef.current=user;},[user]);
  function P(){return profileRef.current;}

  useEffect(()=>{try{const u=localStorage.getItem("fq_current_user");if(u){const p=loadProfile(u);if(p){setUser(u);setProfile(p);profileRef.current=p;userRef.current=u;}}}catch(e){}},[]);

  useEffect(()=>{
    const iv=setInterval(()=>{
      const mins=Math.floor((Date.now()-sessionStart)/60000);
      setMinutesUsed(mins);
    },10000);
    return()=>clearInterval(iv);
  },[sessionStart]);

  useEffect(()=>{
    if(profile){const today=getTodayKey();setDailyActions(profile.dailyLog?.[today]||0);}
  },[user]);

  const isAdmin = ADMIN_USERS.includes(user);
  const limited = isAdmin ? false : (minutesUsed >= DAILY_LIMIT_MINUTES || dailyActions >= DAILY_ACTION_LIMIT);
  const freeAccess = section==="dictionary"||section==="notes"||(section==="learn"&&learnTab==="sentences");

  function onLogin(username){
    const p=loadProfile(username)||{...DEFAULT_PROFILE};
    setUser(username);setProfile(p);profileRef.current=p;userRef.current=username;
    localStorage.setItem("fq_current_user",username);
  }
  function logout(){setUser(null);setProfile(null);profileRef.current=null;localStorage.removeItem("fq_current_user");setSection("learn");}

  function save(newProfile){profileRef.current=newProfile;setProfile(newProfile);if(userRef.current)saveProfile(userRef.current,newProfile);}

  function recordAction(){
    const p=P();if(!p)return;
    const today=getTodayKey();const newLog={...(p.dailyLog||{}), [today]:((p.dailyLog||{})[today]||0)+1};
    const np={...p,dailyLog:newLog};save(np);setDailyActions(newLog[today]);
  }

  function showToast(msg){setToast(msg);}
  function awardBadge(id){
    const p=P();if(!p)return;
    if(!p.earnedBadges.includes(id)){const np={...p,earnedBadges:[...p.earnedBadges,id]};save(np);const b=ALL_BADGES.find(b=>b.id===id);if(b)showToast("Badge: "+b.name+"!");}
  }
  function addPoints(n){
    const p=P();if(!p)return;
    const np={...p,points:p.points+n,totalPts:p.totalPts+n};save(np);
    if(np.totalPts>=50)setTimeout(()=>awardBadge("fifty_points"),50);
    if(np.totalPts>=100)setTimeout(()=>awardBadge("hundred_points"),50);
  }
  function onTestPass(levelId){
    const p=P();if(!p)return;
    if(!p.completedTests.includes(levelId)){
      const np={...p,completedTests:[...p.completedTests,levelId]};
      save(np);awardBadge("first_test");
      if(levelId>=1)setTimeout(()=>awardBadge("level_2"),50);if(levelId>=2)setTimeout(()=>awardBadge("level_3"),50);
      if(levelId>=3)setTimeout(()=>awardBadge("level_4"),50);if(levelId>=4)setTimeout(()=>awardBadge("level_5"),50);
    }
    const p2=P();
    const nextId=levelId+1;
    if(nextId<=LEVELS.length&&!p2.unlockedLevels.includes(nextId)){
      save({...p2,unlockedLevels:[...p2.unlockedLevels,nextId]});
      showToast("Level "+nextId+" unlocked!");
    }
  }
  function onExerciseComplete(){
    const p=P();if(!p)return;
    const nc=p.exerciseCount+1;save({...p,exerciseCount:nc});
    if(nc>=5)setTimeout(()=>awardBadge("five_exercises"),50);
    if(nc>=10)setTimeout(()=>awardBadge("ten_exercises"),50);
  }
  function onFlashcardComplete(){awardBadge("first_card");addPoints(1);}
  function onShopSpend(cost,item){
    const p=P();if(!p)return;
    const np={...p,points:p.points-cost,purchaseHistory:[...p.purchaseHistory,item]};save(np);
    if(p.purchaseHistory.length===0)awardBadge("first_shop");showToast("Claimed: "+item.name);
  }
  function onFishCatch(fish,forceInv){
    const p=P();if(!p)return;
    if(forceInv!==undefined){save({...p,fishInventory:forceInv});return;}
    if(!fish)return;
    const np={...p,fishInventory:[...p.fishInventory,fish],fishCaught:(p.fishCaught||0)+1};save(np);
    if(np.fishCaught===1)setTimeout(()=>awardBadge("first_fish"),50);
    if(np.fishCaught>=10)setTimeout(()=>awardBadge("ten_fish"),50);
    if(fish.rarity==="rare"||fish.rarity==="epic"||fish.rarity==="legendary")setTimeout(()=>awardBadge("rare_fish"),50);
    showToast("Caught: "+fish.name+"!");
  }
  function onFishSpendPoints(n){const p=P();if(!p)return;if(n>0){save({...p,points:p.points-n});}else{save({...p,points:p.points-n,totalPts:p.totalPts-n});}}
  function onUpgradeRod(lvl){const p=P();if(!p)return;save({...p,rodLevel:lvl});showToast("Rod upgraded!");}
  function onSaveNotes(notes){const p=P();if(!p)return;save({...p,notes});}

  if(!user)return<LoginScreen onLogin={onLogin}/>;
  if(!profile)return<div style={{textAlign:'center',padding:60,color:'#888'}}>Loading...</div>;

  const level=LEVELS.find(l=>l.id===currentLevel);
  const maxUnlocked=Math.max(...profile.unlockedLevels);
  const timerClass=isAdmin?"":minutesUsed>=DAILY_LIMIT_MINUTES?"expired":minutesUsed>=12?"warning":"";
  const timerDisplay=isAdmin?minutesUsed+"m":minutesUsed+"m / "+DAILY_LIMIT_MINUTES+"m";

  const tabs=[
    {id:"learn",label:"Learn",icon:I.book(15)},
    {id:"fishing",label:"Fishing",icon:I.fish(15)},
    {id:"test",label:"Test",icon:I.trophy(15)},
    {id:"dictionary",label:"Dict.",icon:I.search(15)},
    {id:"notes",label:"Notes",icon:I.note(15)},
    {id:"shop",label:"Shop",icon:I.bag(15)},
    {id:"collection",label:"Badges",icon:I.star(15)},
  ];

  return(<div>
    {toast&&<Toast message={toast} onDone={()=>setToast(null)}/>}
    <div className="nav">
      <div className="nav-logo" onClick={()=>setSection("learn")}>{I.leaf(20,"#6B8E4E")} FQ</div>
      <div className="nav-tabs">{tabs.map(t=>(<button key={t.id} onClick={()=>setSection(t.id)} className={`nav-tab ${section===t.id?'active':''}`}>{t.icon} <span className="label">{t.label}</span></button>))}</div>
      <div className="nav-right">
        <div className={`nav-timer ${timerClass}`}>{I.clock(12)} {timerDisplay}{isAdmin&&" \u221e"}</div>
        <div className="nav-points">{I.star(12,"#D4A053","#D4A053")} {profile.points}</div>
        <button className="nav-user" onClick={logout}>{I.user(12)} {user} {I.logout(12)}</button>
      </div>
    </div>
    <div className="container">

      {section==="learn"&&(<div>
        <h2 className="section-title">Learn French</h2>
        <p className="section-desc">Take your time -- there's no rush!</p>
        <LevelSelector levels={LEVELS} unlockedLevels={profile.unlockedLevels} currentLevel={currentLevel} setCurrentLevel={setCurrentLevel} completedTests={profile.completedTests}/>
        <div className="level-info" style={{background:level.color+'10',border:`2px solid ${level.color}30`}}>
          <span style={{fontWeight:700,color:level.color}}>Level {level.id}: {level.name}</span><span style={{color:'#888',marginLeft:10,fontSize:13}}>{level.description}</span>
        </div>
        <div className="learn-tabs">
          {[{id:"flashcards",label:"Flashcards",icon:I.eye(14)},{id:"sentences",label:"Sentences",icon:I.book(14)},{id:"exercises",label:"Practice",icon:I.target(14)}].map(t=>(
            <button key={t.id} onClick={()=>setLearnTab(t.id)} className={`learn-tab ${learnTab===t.id?'active':''}`}>{t.icon} {t.label}</button>
          ))}
        </div>
        {learnTab==="flashcards"&&(limited?<LimitOverlay/>:<Flashcards key={currentLevel} cards={level.flashcards} onComplete={onFlashcardComplete}/>)}
        {learnTab==="sentences"&&<SentenceViewer key={currentLevel} sentences={level.sentences}/>}
        {learnTab==="exercises"&&<ExercisePanel key={currentLevel} exercises={level.exercises} onPointsEarned={addPoints} onAction={()=>{recordAction();onExerciseComplete();}} limited={limited}/>}
      </div>)}

      {section==="fishing"&&(<div>
        <h2 className="section-title">Fishing Game</h2>
        <p className="section-desc">Catch fish by translating words quickly!</p>
        <FishingGame userLevel={maxUnlocked} rodLevel={profile.rodLevel||1} onCatch={onFishCatch} onAction={recordAction} limited={limited} points={profile.points} onSpendPoints={onFishSpendPoints} onUpgradeRod={onUpgradeRod} fishInventory={profile.fishInventory||[]}/>
      </div>)}

      {section==="test"&&(<div>
        <h2 className="section-title">Level Tests</h2>
        <p className="section-desc">Pass to unlock the next level!</p>
        <LevelSelector levels={LEVELS} unlockedLevels={profile.unlockedLevels} currentLevel={currentLevel} setCurrentLevel={setCurrentLevel} completedTests={profile.completedTests}/>
        <TestPanel key={currentLevel} testData={level.test} levelId={level.id} onPass={onTestPass} onPointsEarned={addPoints} alreadyPassed={profile.completedTests.includes(level.id)} onAction={recordAction} limited={limited}/>
      </div>)}

      {section==="dictionary"&&(<div>
        <h2 className="section-title">Dictionary</h2>
        <p className="section-desc">Search words, phrases, and translate. Always available!</p>
        <Dictionary entries={DICT_ENTRIES}/>
      </div>)}

      {section==="notes"&&(<div>
        <h2 className="section-title">My Notebook</h2>
        <p className="section-desc">Write questions or things you want to remember. Always available!</p>
        <NotesSection notes={profile.notes||[]} onSave={onSaveNotes}/>
      </div>)}

      {section==="shop"&&(<div>
        <h2 className="section-title">Reward Shop</h2>
        <p className="section-desc">Spend your points on real rewards!</p>
        <RewardShop points={profile.points} onSpend={onShopSpend} purchaseHistory={profile.purchaseHistory}/>
      </div>)}

      {section==="collection"&&(<div>
        <h2 className="section-title">Badge Collection</h2>
        <p className="section-desc">Earn badges by learning and playing!</p>
        <Collection badges={ALL_BADGES} earnedBadges={profile.earnedBadges}/>
      </div>)}

      <div className="footer">FrenchQuest -- Learning French, one step at a time</div>
    </div>
  </div>);
}

ReactDOM.render(<App/>, document.getElementById("app"));

</script>
</body>
</html>
